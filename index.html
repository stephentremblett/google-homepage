<!DOCTYPE html>

<head>
<title>Google</title>
<style type="text/css">
body {
    margin:0;
    font-family:arial,sans-serif;
    font-size:13px;
}
a {
    text-decoration:none;
    color:#1a0dab;
}
p {
    margin:0;
}
header {
    margin:20px;
}
#nav {
    float:left;
}
#account {
    float:right;

}
header a {
    color:#000;
    opacity:0.75;

}
#profile {
    background-color:#00897b;
    color:white;
    height:32px;
    width:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:100%;
    opacity:1;
    font-size:15px;
}
#apps {
    background-image:url(https://ssl.gstatic.com/gb/images/i2_2ec824b0.png);
    width:30px;
    height:30px;
    background-position:-132px -38px;
    background-size:528px 68px;
    opacity:0.55;
}
#content {
    display:flex;
    flex-flow:column wrap;
    width:100%;
    justify-content:center;
    align-items:center;
    position:relative;
}
.search {
    border:1px solid #d0d0d0;
    border-radius:25px;
    padding:15px;
    margin:35px 0 20px;
    width:560px;
}
#search-wrap {
    position:relative;
}
.magGlass {
    position: absolute;
    top: 48px;
    left: 15px;
    opacity: 0.35;
    width: 20px;
}
.voice {
    position: absolute;
    top: 45px;
    right: 15px;
    width: 25px;
}
#search-btns {
    display:flex;
}
#search-btns a {
    background-image: -webkit-linear-gradient(top,#f5f5f5,#f1f1f1);
    background-color: #f2f2f2;
    border: 1px solid #f2f2f2;
    border-radius: 4px;
    color: #5F6368;
    font-size: 14px;
    margin: 11px 4px;
    padding: 10px 16px;
    text-align: center;
}
footer {
    background-color:#f0f0f0;
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    border-top:1px solid #e0e0e0;
    font-size:15px;
    color:#6f6f6f;
}
footer a {
    color:#6f6f6f;
}
.loc, .foot-nav {
    padding:10px 20px;
}
.loc {
    border-bottom:1px solid #e0e0e0;
}
.foot-nav {
    display: flex;
    justify-content: space-between;
    width: calc(100% - 40px);
}
.foot-about a {
    margin-right:20px;
}
.foot-priv a {
    margin-left:20px;
}
.foot-priv {
    align-self:flex-end;
}
</style>
</head>
